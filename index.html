<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div class="card">
        <div class="back"></div>
        <div class="front">
            <div class="hover-text">Hover To Open</div>
            <div class="cover-shape-large">
            <div class="shape-diamond"></div>
            <div class="shape-block"></div>
        </div>
        <div class="cover-shape-small">
            <div class="shape-diamond"></div>
            <div class="shape-block">
                <div class="cake">
                    <div class="layer layer-bottom"></div>
                    <div class="layer layer-middle"></div>
                    <div class="layer layer-top"></div>
                    <div class="icing"></div>
                    <div class="drip drip1"></div>
                    <div class="drip drip2"></div>
                    <div class="drip drip3"></div>
                    <div class="candle">
                        <div class="flame"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="text-container">
        <p id="head">Happy Birthday nakshitt!</p>
        <div>Your first digital birthday card! <br> Developed just for you.</div>
        <p>Wish you all the best! Enjoy your day! Lab yahh!❤️.</p>
        </div>
    </div>
</body>
</html
